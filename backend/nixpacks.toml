[phases.setup]
nixPkgs = ["python311"]

[phases.build]
cmds = ["python -c \"import os; [open(f,'w').write('# init\\n') for f in ['services/__init__.py','models/__init__.py','routers/__init__.py']]\"", "pip install -r requirements.txt"]

[start]
cmd = "uvicorn main:app --host 0.0.0.0 --port ${PORT:-8000}"
